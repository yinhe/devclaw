name: Release

# Triggered by any `v*` tag (e.g. v0.1.1, v1.0.0).
# The monorepo's publish pipeline pushes tags of the form v<semver>, which
# fires this workflow and produces signed release artifacts via goreleaser.

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # required to create a GitHub Release

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Go mod tidy
        run: go mod tidy

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
